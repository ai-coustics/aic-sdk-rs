name: Linking Modes

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  AIC_SDK_LICENSE: ${{ secrets.AIC_SDK_LICENSE }}

jobs:
  # Exercises the opt-in linking strategies against a real `libaic` on every platform. Running
  # the `basic_usage` example touches almost the entire FFI surface (model, processor, all
  # process layouts, processor/VAD contexts, bearer-token refresh), so it also guards the
  # hand-maintained runtime symbol table in aic-sdk-sys against ABI drift. The default static
  # link is covered on all platforms by build.yml and tests.yml; this job adds the dynamic and
  # runtime-loading paths.
  linking:
    name: Dynamic & runtime linking (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
            dynamic_link: true
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
            dynamic_link: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
            dynamic_link: true
    defaults:
      run:
        # Use bash everywhere (available on Windows runners via Git Bash) so a single download
        # script covers all platforms.
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2

      - name: Download AIC SDK
        id: sdk
        run: |
          set -eu
          # `grep -oE` (not -P) so this works with BSD grep on macOS too.
          VERSION=$(grep "${{ matrix.target }}" aic-sdk-sys/checksum.txt \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          URL="https://github.com/ai-coustics/aic-sdk-c/releases/download/${VERSION}/aic-sdk-${{ matrix.target }}-${VERSION}.${{ matrix.ext }}"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o "sdk.${{ matrix.ext }}"
          mkdir -p "$PWD/aic-sdk"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            # 7z is preinstalled on Windows runners; Git Bash `tar` cannot extract zip.
            7z x "sdk.zip" -o"$PWD/aic-sdk" >/dev/null
          else
            tar -xzf "sdk.tar.gz" -C "$PWD/aic-sdk"
          fi
          echo "SDK layout:" && find "$PWD/aic-sdk" \( -name 'aic.*' -o -name 'libaic.*' \)

          # The build linker needs the directory holding the link library (libaic.* on Unix,
          # aic.lib on Windows); the runtime loader needs the directory holding the shared
          # library (aic.dll on Windows, the same libaic.* file on Unix). Discover both rather
          # than assuming a fixed layout.
          link_lib=$(find "$PWD/aic-sdk" \( -name 'libaic.*' -o -name 'aic.lib' \) | head -1)
          run_lib=$(find "$PWD/aic-sdk" \( -name 'libaic.so' -o -name 'libaic.dylib' -o -name 'aic.dll' \) | head -1)
          if [ -z "$link_lib" ] || [ -z "$run_lib" ]; then
            echo "Could not locate the AIC link/runtime library in the package" >&2
            exit 1
          fi
          lib_dir=$(dirname "$link_lib")
          run_dir=$(dirname "$run_lib")

          if [ "${{ matrix.ext }}" = "zip" ]; then
            # Emit native Windows paths so the MSVC linker (AIC_LIB_PATH) understands them.
            lib_dir=$(cygpath -w "$lib_dir")
            run_dir=$(cygpath -w "$run_dir")
          fi

          echo "lib_dir=$lib_dir" >> "$GITHUB_OUTPUT"
          echo "run_dir=$run_dir" >> "$GITHUB_OUTPUT"
          # Make the runtime library discoverable for the steps below. On Windows the loader
          # searches PATH; on Unix PATH is harmless and the loader env vars below do the work.
          echo "$run_dir" >> "$GITHUB_PATH"

      - name: Compile-time dynamic linking
        if: ${{ matrix.dynamic_link }}
        env:
          AIC_LIB_PATH: ${{ steps.sdk.outputs.lib_dir }}
          LD_LIBRARY_PATH: ${{ steps.sdk.outputs.run_dir }}
          DYLD_LIBRARY_PATH: ${{ steps.sdk.outputs.run_dir }}
        run: cargo run --example basic_usage --features "download-model dynamic-linking"

      # runtime-linking loads `libaic` lazily by name on first use, so no build-time link step
      # runs and the dynamic loader just needs to find the library (PATH / LD_LIBRARY_PATH /
      # DYLD_LIBRARY_PATH set above).
      - name: Runtime dynamic loading
        env:
          LD_LIBRARY_PATH: ${{ steps.sdk.outputs.run_dir }}
          DYLD_LIBRARY_PATH: ${{ steps.sdk.outputs.run_dir }}
        run: cargo run --example basic_usage --features "download-model runtime-linking"

  # Experimental: dynamic + runtime linking against the Windows GNU/LLVM (`gnullvm`) artifact.
  #
  # This is a separate, gated job rather than a row in the matrix above because building a
  # consumer for `x86_64-pc-windows-gnullvm` needs setup the native MSVC/macOS/Linux rows do not:
  # the rustup target, an llvm-mingw toolchain (the gnullvm DLL runs natively on Windows, but
  # compiling against it needs a MinGW/LLVM linker), a linker override, and an explicit
  # `--target`.
  linking-gnullvm:
    name: Dynamic & runtime linking (x86_64-pc-windows-gnullvm)
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-gnullvm
      # gnullvm ships GNU-style files in a `.tar.gz` like the non-MSVC platforms.
      EXT: tar.gz
      # Use the llvm-mingw clang driver (installed below, on PATH) as the linker for this target.
      CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER: x86_64-w64-mingw32-clang
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: x86_64-pc-windows-gnullvm
      - uses: Swatinem/rust-cache@v2

      - name: Install llvm-mingw toolchain
        run: |
          set -eu
          # Prebuilt UCRT/x86_64 toolchain that provides the gnullvm linker and import libs.
          # Pin a known release; bump as needed.
          LLVM_MINGW_VERSION=20250528
          ZIP="llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-x86_64.zip"
          URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/${ZIP}"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o "$ZIP"
          # 7z is preinstalled on Windows runners; Git Bash `tar` cannot extract zip.
          7z x "$ZIP" -o"$PWD/llvm-mingw" >/dev/null
          # The zip extracts into a single top-level dir; add its bin/ (holding the clang driver)
          # to PATH so cargo's linker override resolves.
          clang_exe=$(find "$PWD/llvm-mingw" -name 'x86_64-w64-mingw32-clang.exe' | head -1)
          if [ -z "$clang_exe" ]; then
            echo "llvm-mingw clang driver not found after extraction" >&2
            exit 1
          fi
          cygpath -w "$(dirname "$clang_exe")" >> "$GITHUB_PATH"

      - name: Download AIC SDK (gnullvm)
        id: sdk
        run: |
          set -eu
          # `grep -oE` (not -P) so this works with BSD grep too.
          VERSION=$(grep "$TARGET" aic-sdk-sys/checksum.txt \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "${VERSION:-}" ]; then
            echo "No checksum.txt entry for $TARGET yet; the gnullvm artifact is not published." >&2
            echo "Add the published artifact's sha256 to aic-sdk-sys/checksum.txt first." >&2
            exit 1
          fi
          URL="https://github.com/ai-coustics/aic-sdk-c/releases/download/${VERSION}/aic-sdk-${TARGET}-${VERSION}.${EXT}"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o "sdk.${EXT}"
          mkdir -p "$PWD/aic-sdk"
          # Git Bash `tar` handles `.tar.gz` fine on Windows runners.
          tar -xzf "sdk.${EXT}" -C "$PWD/aic-sdk"
          echo "SDK layout:" && find "$PWD/aic-sdk" \( -name 'aic.*' -o -name 'libaic.*' \)

          # Link dir holds the import/static library (libaic.dll.a / libaic.a); runtime dir holds
          # aic.dll. Discover both rather than assuming a fixed layout.
          link_lib=$(find "$PWD/aic-sdk" -name 'libaic.*' | head -1)
          run_lib=$(find "$PWD/aic-sdk" -name 'aic.dll' | head -1)
          if [ -z "$link_lib" ] || [ -z "$run_lib" ]; then
            echo "Could not locate the AIC link/runtime library in the package" >&2
            exit 1
          fi
          # clang/lld want native Windows paths for the link-search dir.
          lib_dir=$(cygpath -w "$(dirname "$link_lib")")
          run_dir=$(cygpath -w "$(dirname "$run_lib")")
          echo "lib_dir=$lib_dir" >> "$GITHUB_OUTPUT"
          echo "run_dir=$run_dir" >> "$GITHUB_OUTPUT"
          # The Windows loader searches PATH for aic.dll at run time.
          echo "$run_dir" >> "$GITHUB_PATH"

      # Default static linking: build.rs emits `static=aic` (resolving `libaic.a` in the lib dir)
      # plus the Windows system libs the static archive depends on.
      - name: Compile-time static linking
        env:
          AIC_LIB_PATH: ${{ steps.sdk.outputs.lib_dir }}
        run: cargo run --target "$TARGET" --example basic_usage --features "download-model"

      - name: Compile-time dynamic linking
        env:
          AIC_LIB_PATH: ${{ steps.sdk.outputs.lib_dir }}
        run: cargo run --target "$TARGET" --example basic_usage --features "download-model dynamic-linking"

      # runtime-linking loads aic.dll lazily by name on first use; no build-time link step runs,
      # so the loader just needs aic.dll on PATH (set above).
      - name: Runtime dynamic loading
        run: cargo run --target "$TARGET" --example basic_usage --features "download-model runtime-linking"
