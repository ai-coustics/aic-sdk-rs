name: Build

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, windows-11-arm]
    env:
      AIC_SDK_LICENSE: ${{ secrets.AIC_SDK_LICENSE }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      # `--all-features` is intentionally avoided here: it would enable `runtime-linking`,
      # which changes the linking strategy and requires loading the library at runtime. The
      # dedicated dynamic/runtime linking modes are covered by linking.yml.
      - name: Build and Run Examples
        run: |
          cargo run --example basic_usage --features "download-lib download-model"
          cargo run --package build-time-download --features download-lib
          cargo run --example parallel_async --features "async download-lib download-model"
